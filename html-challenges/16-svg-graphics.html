<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Graphics Challenge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .svg-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        svg {
            display: block;
            margin: 10px auto;
        }
    </style>
</head>
<body>
    <h1>SVG Graphics Challenge</h1>
    <p>Create interactive SVG graphics using HTML5</p>
    
    <div class="svg-container">
        <h2>Challenge: Create basic SVG shapes</h2>
        <svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
            <!-- Add your SVG shapes here -->
            <rect x="10" y="10" width="100" height="80" fill="#4CAF50" />
            <circle cx="200" cy="50" r="40" fill="#2196F3" />
            <polygon points="50,150 100,100 150,150" fill="#FF9800" />
        </svg>
    </div>
    
    <div class="svg-container">
        <h2>Challenge: Create animated SVG</h2>
        <svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
            <!-- Add animation and transforms here -->
            <circle cx="150" cy="100" r="30" fill="#E91E63">
                <animate attributeName="r" from="30" to="60" dur="2s" repeatCount="indefinite" />
            </circle>
        </svg>
    </div>
</body>
</html>
