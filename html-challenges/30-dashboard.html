<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 200px;
    background: #333;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    flex: 1 1 150px;
    border-radius: 10px;
    text-align: center;
}

/* Chart */
.chart-container {
    margin-top: 30px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2>Dashboard</h2>
        <p>Home</p>
        <p>Analytics</p>
        <p>Settings</p>
    </div>

    <div class="main">

        <h2>📊 Overview</h2>

        <div class="cards">
            <div class="card">Users<br><b>120</b></div>
            <div class="card">Sales<br><b>₹15,000</b></div>
            <div class="card">Orders<br><b>320</b></div>
        </div>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
        datasets: [{
            label: 'Sales',
            data: [12, 19, 8, 15, 20]
        }]
    }
});
</script>

</body>
</html>
