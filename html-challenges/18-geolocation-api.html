<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation API Challenge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background-color: #0b7dda;
        }
        .info-box {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
            min-width: 300px;
        }
        .location-info {
            display: none;
        }
        .location-info.show {
            display: block;
        }
        .info-item {
            margin: 10px 0;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        .error {
            color: #d32f2f;
        }
        .success {
            color: #388e3c;
        }
    </style>
</head>
<body>
    <h1>Geolocation API Challenge</h1>
    <p>Use HTML5 Geolocation API to get user's location</p>
    
    <button onclick="getLocation()">Get My Location</button>
    <button onclick="watchLocation()">Watch Location</button>
    <button onclick="clearWatch()">Stop Watching</button>
    
    <div class="info-box">
        <div id="status" class="info-item">Status: Ready</div>
        <div id="locationInfo" class="location-info show">
            <div class="info-item">
                <strong>Latitude:</strong> <span id="latitude">-</span>
            </div>
            <div class="info-item">
                <strong>Longitude:</strong> <span id="longitude">-</span>
            </div>
            <div class="info-item">
                <strong>Accuracy:</strong> <span id="accuracy">-</span> meters
            </div>
            <div class="info-item">
                <strong>Altitude:</strong> <span id="altitude">-</span> meters
            </div>
            <div class="info-item">
                <strong>Speed:</strong> <span id="speed">-</span> m/s
            </div>
        </div>
    </div>
    
    <script>
        let watchId = null;
        
        function getLocation() {
            if (navigator.geolocation) {
                document.getElementById('status').innerHTML = '<span class="success">Getting location...</span>';
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                document.getElementById('status').innerHTML = '<span class="error">Geolocation is not supported</span>';
            }
        }
        
        function watchLocation() {
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(showPosition, showError);
                document.getElementById('status').innerHTML = '<span class="success">Watching location...</span>';
            }
        }
        
        function clearWatch() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('status').innerHTML = 'Status: Stopped watching';
            }
        }
        
        function showPosition(position) {
            const coords = position.coords;
            document.getElementById('latitude').textContent = coords.latitude.toFixed(6);
            document.getElementById('longitude').textContent = coords.longitude.toFixed(6);
            document.getElementById('accuracy').textContent = coords.accuracy.toFixed(2);
            document.getElementById('altitude').textContent = coords.altitude ? coords.altitude.toFixed(2) : 'N/A';
            document.getElementById('speed').textContent = coords.speed ? coords.speed.toFixed(2) : 'N/A';
            document.getElementById('status').innerHTML = '<span class="success">Location retrieved successfully</span>';
        }
        
        function showError(error) {
            let errorMsg = 'Unknown error';
            if (error.code === 1) {
                errorMsg = 'Permission denied';
            } else if (error.code === 2) {
                errorMsg = 'Position unavailable';
            } else if (error.code === 3) {
                errorMsg = 'Request timeout';
            }
            document.getElementById('status').innerHTML = `<span class="error">Error: ${errorMsg}</span>`;
        }
    </script>
</body>
</html>
