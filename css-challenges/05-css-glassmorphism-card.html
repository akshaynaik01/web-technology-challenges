<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Glassmorphism Card Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1200px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      transition: all 0.3s ease-in-out;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px 0 rgba(31, 38, 135, 0.5);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .card-title {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .card-description {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .card-button {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.4);
      color: #ffffff;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-button:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        padding: 20px;
        gap: 20px;
      }

      .card {
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-icon">🎨</div>
      <h2 class="card-title">Design</h2>
      <p class="card-description">Create stunning visual designs with modern CSS techniques and gradients.</p>
      <button class="card-button">Learn More</button>
    </div>

    <div class="card">
      <div class="card-icon">💻</div>
      <h2 class="card-title">Development</h2>
      <p class="card-description">Master web development with HTML, CSS, and JavaScript fundamentals.</p>
      <button class="card-button">Learn More</button>
    </div>

    <div class="card">
      <div class="card-icon">🚀</div>
      <h2 class="card-title">Launch</h2>
      <p class="card-description">Deploy your projects and showcase your work to the world.</p>
      <button class="card-button">Learn More</button>
    </div>
  </div>
</body>
</html>
