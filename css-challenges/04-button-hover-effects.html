<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Hover Effects Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .button-container {
      display: grid;
      grid-template-columns: repeat(2, 200px);
      gap: 30px;
      padding: 40px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-1 {
      background-color: #e74c3c;
      color: white;
      border-radius: 5px;
    }

    .btn-1:hover {
      background-color: #c0392b;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-1:active {
      transform: translateY(-1px);
    }

    .btn-2 {
      background-color: #3498db;
      color: white;
      border-radius: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-2:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-2:active {
      transform: scale(0.98);
    }

    .btn-3 {
      background-color: #2ecc71;
      color: white;
      position: relative;
      border-radius: 5px;
    }

    .btn-3::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: #27ae60;
      transition: left 0.3s ease;
      z-index: -1;
    }

    .btn-3:hover::before {
      left: 0;
    }

    .btn-3:hover {
      color: white;
    }

    .btn-4 {
      background-color: transparent;
      color: white;
      border: 2px solid white;
      border-radius: 5px;
      position: relative;
    }

    .btn-4::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background-color: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }

    .btn-4:hover::after {
      width: 300px;
      height: 300px;
      transition: width 0.5s, height 0.5s;
    }

    .btn-4:hover {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="button-container">
    <button class="btn btn-1">Lift Effect</button>
    <button class="btn btn-2">Scale Up</button>
    <button class="btn btn-3">Slide Right</button>
    <button class="btn btn-4">Ripple Effect</button>
  </div>
</body>
</html>
